services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    user: "${UID}:${GID}"
    ports:
      - "8080:80"
    volumes:
      - /srv/mergerfs/Bucket/System/appData/filebrowser/data:/srv
      - /srv/dev-disk-by-uuid-77ad6323-4ed9-4b24-b6a2-783628b3c35d/System/appData/filebrowser/database:/database
      - /srv/dev-disk-by-uuid-77ad6323-4ed9-4b24-b6a2-783628b3c35d/System/appData/filebrowser/config:/config
    environment:
      - PUID=1000
      - PGID=1000
    restart: unless-stopped

    networks:
      vlan23:
        ipv4_address: 172.20.23.71  # pick a free IP in the subnet

networks:
  vlan23:
    external: true