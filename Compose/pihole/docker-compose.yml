services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    hostname: DNS-home
    environment:
      - TZ=Asia/Jakarta
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "67:67/udp"
      - "80:80/tcp"
    volumes:
      - ~/appData/pihole/etc:/etc/pihole
      - ~/appData/pihole/dnsmasq:/etc/dnsmasq.d
    restart: unless-stopped